name: 📎 Nuevo recurso
description: Agrega una página o recurso web a la base de conocimiento (solo pega el link)
title: "[Nuevo recurso] "
labels: ["nuevo-recurso"]
body:
  - type: input
    id: link
    attributes:
      label: Link
      description: Pega la URL completa. El título y la descripción se obtienen automáticamente de la página.
      placeholder: "https://ejemplo.com"
    validations:
      required: true

  - type: input
    id: categoria
    attributes:
      label: Categoría / Etiquetas (opcional)
      description: Si lo dejas vacío, se marcará como "Por clasificar"
      placeholder: "educación, cursos, gratis"
    validations:
      required: false

  - type: textarea
    id: notas
    attributes:
      label: Notas (opcional)
      description: ¿Por qué te interesa este link? ¿Para qué lo quieres usar?
    validations:
      required: false
