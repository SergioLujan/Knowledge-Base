name: Agregar recurso a la base de conocimiento

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  agregar-recurso:
    if: contains(github.event.issue.labels.*.name, 'nuevo-recurso')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Leer link, visitar la página y actualizar recursos.md
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = context.payload.issue.body;

            function extractField(label) {
              const regex = new RegExp(`### ${label}[^\\n]*\\s*\\n+([^\\n#]+(?:\\n(?!###)[^\\n]*)*)`, 'i');
              const match = body.match(regex);
              return match ? match[1].trim() : '';
            }

            const link = extractField('Link');
            let categoria = extractField('Categoría / Etiquetas \\(opcional\\)');
            let notas = extractField('Notas \\(opcional\\)');

            if (!categoria || categoria.toLowerCase().includes('_no response_')) {
              categoria = '_Por clasificar_';
            }
            if (!notas || notas.toLowerCase().includes('_no response_')) {
              notas = '_(sin notas)_';
            }

            let titulo = '';
            let descripcion = '';
            let dominio = '';

            try {
              dominio = new URL(link).hostname.replace('www.', '');
            } catch {
              dominio = link;
            }

            try {
              const res = await fetch(link, {
                headers: {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0 Safari/537.36'
                }
              });
              const html = await res.text();

              const titleMatch = html.match(/<title[^>]*>([^<]*)<\/title>/i);
              titulo = titleMatch ? titleMatch[1].trim() : dominio;

              const descMatch =
                html.match(/<meta\s+name=["']description["']\s+content=["']([^"']*)["'][^>]*>/i) ||
                html.match(/<meta\s+content=["']([^"']*)["']\s+name=["']description["'][^>]*>/i) ||
                html.match(/<meta\s+property=["']og:description["']\s+content=["']([^"']*)["'][^>]*>/i);

              descripcion = descMatch ? descMatch[1].trim() : 'No se encontró descripción automática en la página.';
            } catch (err) {
              titulo = dominio;
              descripcion = 'No se pudo acceder automáticamente a la página para extraer la descripción.';
            }

            // Limpiar caracteres que rompan la tabla markdown
            const limpiar = (s) => s.replace(/\|/g, '-').replace(/\n/g, ' ').trim();
            titulo = limpiar(titulo);
            descripcion = limpiar(descripcion);

            const fecha = new Date().toISOString().split('T')[0];
            const nuevaFila = `| ${fecha} | ${titulo} | [${dominio}](${link}) | ${descripcion} | ${categoria} | ${notas} |`;

            const path = 'recursos.md';
            let contenido = fs.readFileSync(path, 'utf8');
            const lineas = contenido.split('\n');
            const idxSeparador = lineas.findIndex(l => l.startsWith('|---'));
            lineas.splice(idxSeparador + 1, 0, nuevaFila);
            contenido = lineas.join('\n');
            fs.writeFileSync(path, contenido);

      - name: Commit y push de los cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add recursos.md
          git commit -m "Agrega nuevo recurso vía issue #${{ github.event.issue.number }}"
          git push

      - name: Cerrar el issue y confirmar
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed'
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: '✅ Recurso agregado a `recursos.md` con título y descripción extraídos automáticamente.'
            });
